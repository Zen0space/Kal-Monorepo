name: kal-monorepo

# Load environment variables from root .env file
# This allows running: docker compose -f docker/docker-compose.yml up -d from monorepo root

services:
  mongodb:
    image: mongo:7
    container_name: kal-mongodb
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE}
    volumes:
      - mongodb_data:/data/db
    networks:
      - kal-network

  postgres:
    image: postgres:14-alpine
    container_name: kal-postgres
    environment:
      POSTGRES_USER: ${LOGTO_DB_USER}
      POSTGRES_PASSWORD: ${LOGTO_DB_PASSWORD}
      POSTGRES_DB: ${LOGTO_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kal-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${LOGTO_DB_USER:-logto} -d ${LOGTO_DB_NAME:-logto}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  logto:
    image: svhd/logto:latest
    container_name: kal-logto
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe && npm start"]
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - TRUST_PROXY_HEADER=1
      - DB_URL=postgres://${LOGTO_DB_USER:-logto}:${LOGTO_DB_PASSWORD:-logtopassword}@postgres:5432/${LOGTO_DB_NAME:-logto}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kal-network

  redis:
    image: redis:7-alpine
    container_name: kal-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - kal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongodb_data:
  postgres_data:
  redis_data:

networks:
  kal-network:
    driver: bridge

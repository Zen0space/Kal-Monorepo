# Shared packages CI — Lint & Build for kal-shared and kal-baml
# These are dependencies of all other packages, so they run on any shared change.

name: Shared

on:
  push:
    branches: [main, dev]
    paths:
      - "packages/kal-shared/**"
      - "packages/kal-baml/**"
      - "packages/kal-db/**"
      - ".github/workflows/shared.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "packages/kal-shared/**"
      - "packages/kal-baml/**"
      - "packages/kal-db/**"
      - ".github/workflows/shared.yml"

concurrency:
  group: shared-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint kal-shared
        run: pnpm --filter kal-shared lint

      - name: Build kal-shared
        run: pnpm --filter kal-shared build

      - name: Build kal-baml
        run: pnpm --filter kal-baml build

      - name: Type check kal-shared
        run: pnpm --filter kal-shared typecheck

# Frontend CI — Lint, Type Check & Build
# Triggers on changes to kal-frontend, kal-shared, or kal-baml

name: Frontend

on:
  push:
    branches: [main, dev]
    paths:
      - "packages/kal-frontend/**"
      - "packages/kal-shared/**"
      - "packages/kal-baml/**"
      - "packages/kal-backend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "packages/kal-frontend/**"
      - "packages/kal-shared/**"
      - "packages/kal-baml/**"
      - "packages/kal-backend/**"
      - ".github/workflows/frontend.yml"

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared dependencies
        run: |
          pnpm --filter kal-shared build
          pnpm --filter kal-baml build

      - name: Lint
        run: pnpm --filter kal-frontend lint

      - name: Type check
        run: pnpm --filter kal-frontend typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared dependencies
        run: |
          pnpm --filter kal-shared build
          pnpm --filter kal-baml build

      - name: Build frontend
        run: pnpm --filter kal-frontend build
        env:
          NEXT_PUBLIC_BACKEND_URL: https://kalori-api.my
          NEXT_PUBLIC_APP_URL: https://kalori-api.my
          NEXT_PUBLIC_API_URL: https://kalori-api.my/api
          NEXT_PUBLIC_LOGTO_ENDPOINT: https://auth.kalori-api.my
          NEXT_PUBLIC_LOGTO_APP_ID: placeholder
